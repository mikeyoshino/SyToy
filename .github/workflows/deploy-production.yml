name: Deploy production

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: toystore-production
  cancel-in-progress: false

jobs:
  verify-build-deploy:
    name: Verify, build image and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production

    steps:
      - name: Validate branch input
        env:
          DEPLOY_BRANCH: ${{ inputs.branch }}
        run: git check-ref-format --branch "$DEPLOY_BRANCH"

      - name: Check out selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 1

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            .config/dotnet-tools.json

      - name: Restore tools and packages
        run: |
          dotnet tool restore
          dotnet restore ToyStore.sln

      - name: Build release
        run: dotnet build ToyStore.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ToyStore.sln --configuration Release --no-build --logger "console;verbosity=normal"

      - name: Generate migration review artifact
        run: |
          mkdir -p artifacts
          dotnet ef migrations script --idempotent \
            --project src/ToyStore.Infrastructure \
            --startup-project src/ToyStore.Web \
            --configuration Release \
            --no-build \
            --output artifacts/migrate.sql

      - name: Preserve migration review artifact
        uses: actions/upload-artifact@v4
        with:
          name: toystore-migration-${{ github.run_id }}
          path: artifacts/migrate.sql
          if-no-files-found: error
          retention-days: 14

      - name: Resolve immutable image name
        id: image
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          release_sha="$(git rev-parse HEAD)"
          echo "name=ghcr.io/$repository" >> "$GITHUB_OUTPUT"
          echo "tag=ghcr.io/$repository:$release_sha" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push production image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure pinned SSH host and deployment key
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$VPS_SSH_PRIVATE_KEY"
          test -n "$VPS_SSH_KNOWN_HOSTS"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" >/dev/null

      - name: Deploy immutable image on VPS
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          : "${VPS_HOST:?Set the production VPS_HOST variable}"
          : "${VPS_USER:?Set the production VPS_USER variable}"
          : "${IMAGE_DIGEST:?Docker build did not return an image digest}"
          VPS_PORT="${VPS_PORT:-22}"
          image_ref="$IMAGE_NAME@$IMAGE_DIGEST"
          ssh -p "$VPS_PORT" -o BatchMode=yes -o IdentitiesOnly=yes \
            "$VPS_USER@$VPS_HOST" \
            "sudo /usr/local/sbin/toystore-deploy '$image_ref'"

      - name: Verify public readiness
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          : "${PRODUCTION_URL:?Set the production PRODUCTION_URL variable}"
          curl --fail --show-error --silent \
            --retry 10 --retry-all-errors --retry-delay 3 \
            "${PRODUCTION_URL%/}/health/ready"

      - name: Remove runner SSH material
        if: always()
        run: rm -rf "$HOME/.ssh"
