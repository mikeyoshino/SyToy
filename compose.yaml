name: toystore-local

services:
  postgres:
    image: postgres:17-alpine
    container_name: toystore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-toystore}
      POSTGRES_USER: ${POSTGRES_USER:-toystore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toystore_dev}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - toystore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  toystore_postgres_data:
